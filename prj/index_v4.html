<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑规范数据库查询系统</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --panel-soft: #f8fafc;
            --line: #d9e1e8;
            --line-soft: #e9eef3;
            --text: #1f2937;
            --text-soft: #5b6573;
            --title: #0f172a;
            --primary: #2f6fdd;
            --primary-hover: #1f5cc5;
            --primary-soft: #eaf2ff;
            --secondary: #6b7280;
            --secondary-hover: #4b5563;
            --danger: #d14343;
            --danger-soft: #fdecec;
            --green-soft: #e8f7ef;
            --purple-soft: #f1ebfb;
            --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            --radius: 14px;
            --sidebar-width: 312px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
            padding: 18px;
        }

        .container {
            max-width: 1480px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #1f4f95 0%, #2f6fdd 52%, #5f8ef0 100%);
            color: #fff;
            padding: 24px 28px;
            border-radius: 18px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 1.9rem;
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .header p {
            font-size: 0.98rem;
            opacity: 0.96;
        }

        .app-layout {
            display: grid;
            grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
            gap: 16px;
            align-items: start;
        }

        .query-section,
        .results-section {
            background: var(--panel);
            border: 1px solid var(--line-soft);
            border-radius: 18px;
            box-shadow: var(--shadow);
        }

        .query-section {
            padding: 18px;
            position: sticky;
            top: 18px;
        }

        .query-title,
        .results-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .query-title h2,
        .results-title h2 {
            font-size: 1.06rem;
            color: var(--title);
            font-weight: 700;
        }

        .panel-hint {
            font-size: 0.83rem;
            color: var(--text-soft);
        }

        .filter-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-group,
        .search-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label,
        .search-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--title);
        }

        .filter-select,
        .search-input {
            width: 100%;
            min-height: 40px;
            padding: 9px 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            color: var(--text);
            font-size: 0.93rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .filter-select:focus,
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(47, 111, 221, 0.12);
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 6px;
        }

        .btn {
            min-height: 40px;
            border: none;
            border-radius: 10px;
            font-size: 0.94rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 8px 20px rgba(47, 111, 221, 0.25);
        }

        .btn-secondary {
            background: #eef2f7;
            color: var(--secondary);
            border: 1px solid var(--line);
        }

        .btn-secondary:hover {
            background: #e6ebf2;
            color: var(--secondary-hover);
        }

        .query-note {
            margin-top: 14px;
            padding: 12px 12px;
            border-radius: 12px;
            background: var(--panel-soft);
            border: 1px solid var(--line-soft);
            font-size: 0.82rem;
            color: var(--text-soft);
        }

        .results-section {
            padding: 18px 18px 14px;
            min-width: 0;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            padding-bottom: 14px;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--line-soft);
            flex-wrap: wrap;
        }

        .results-header h2 {
            font-size: 1.18rem;
            color: var(--title);
            font-weight: 700;
        }

        .results-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .results-count,
        .page-status {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 0 12px;
            border-radius: 999px;
            font-size: 0.88rem;
            border: 1px solid var(--line-soft);
            background: var(--panel-soft);
            color: var(--text-soft);
            white-space: nowrap;
        }

        .results-table-wrap {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--line-soft);
            border-radius: 14px;
        }

        .results-table {
            width: 100%;
            min-width: 920px;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
        }

        .results-table th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #edf3fb;
            color: var(--title);
            text-align: left;
            padding: 13px 14px;
            font-size: 0.9rem;
            font-weight: 700;
            border-bottom: 1px solid var(--line);
        }

        .results-table td {
            padding: 13px 14px;
            vertical-align: top;
            border-bottom: 1px solid var(--line-soft);
            font-size: 0.92rem;
            background: #fff;
        }

        .results-table tbody tr:nth-child(even) td {
            background: #fbfcfe;
        }

        .results-table tbody tr:hover td {
            background: #f3f8ff;
        }

        .rank-cell {
            text-align: center;
            font-weight: 700;
            color: var(--title);
        }

        .norm-name {
            font-weight: 700;
            color: var(--title);
            font-size: 0.98rem;
            line-height: 1.45;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 22px;
            padding: 0 8px;
            border-radius: 999px;
            font-size: 0.78rem;
            color: #334155;
            border: 1px solid transparent;
        }

        .tag-gray {
            background: #eef2f6;
            border-color: #e2e8f0;
        }

        .tag-purple {
            background: var(--purple-soft);
            border-color: #e6daf8;
        }

        .tag-green {
            background: var(--green-soft);
            border-color: #d3efdf;
        }

        .norm-code {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 8px;
            background: var(--primary-soft);
            color: #174ea6;
            font-family: Consolas, Monaco, monospace;
            font-size: 0.88rem;
            word-break: break-all;
        }

        .topic-text {
            margin-top: 8px;
            font-size: 0.84rem;
            color: var(--text-soft);
            line-height: 1.45;
        }

        .violation-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            min-height: 30px;
            padding: 0 10px;
            border-radius: 999px;
            background: var(--danger);
            color: #fff;
            font-weight: 700;
            font-size: 0.88rem;
        }

        .content-cell {
            color: #374151;
            line-height: 1.72;
            word-break: break-word;
        }

        .group-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .main-content-text {
            line-height: 1.72;
        }

        .child-toggle-btn {
            align-self: flex-start;
            min-height: 30px;
            padding: 0 10px;
            border: 1px solid #c9daf8;
            border-radius: 999px;
            background: #f3f8ff;
            color: #1f5cc5;
            font-size: 0.83rem;
            font-weight: 700;
            cursor: pointer;
        }

        .child-toggle-btn:hover {
            background: #eaf2ff;
        }

        .child-list {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 2px;
            padding: 12px;
            border-radius: 12px;
            background: #f8fbff;
            border: 1px solid #dbe7fb;
        }

        .child-list.is-open {
            display: flex;
        }


        .detail-toggle-btn {
            align-self: flex-start;
            min-height: 30px;
            padding: 0 10px;
            border: 1px solid #d9e3f0;
            border-radius: 999px;
            background: #f8fafc;
            color: #3b556f;
            font-size: 0.83rem;
            font-weight: 700;
            cursor: pointer;
        }

        .detail-toggle-btn:hover {
            background: #eef3f8;
        }

        .detail-block {
            display: none;
            margin-top: 2px;
            padding: 12px;
            border-radius: 12px;
            background: #fbfcfe;
            border: 1px solid #e5ebf3;
        }

        .detail-block.is-open {
            display: block;
        }

        .detail-title {
            margin-bottom: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-soft);
        }

        .detail-text {
            color: #4b5563;
            line-height: 1.72;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .child-item {
            padding: 10px 12px;
            border-radius: 10px;
            background: #ffffff;
            border: 1px solid #e6edf7;
        }

        .child-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .child-code {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 8px;
            background: #eef4ff;
            color: #184a95;
            font-family: Consolas, Monaco, monospace;
            font-size: 0.84rem;
            word-break: break-all;
        }

        .child-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            min-height: 24px;
            padding: 0 8px;
            border-radius: 999px;
            background: #f5dede;
            color: #b42318;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .group-topic-list {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .group-topic-chip {
            display: inline-flex;
            align-items: center;
            min-height: 22px;
            padding: 0 8px;
            border-radius: 999px;
            background: #f6f8fb;
            border: 1px solid #e2e8f0;
            color: #475569;
            font-size: 0.76rem;
        }

        .violation-meta {
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--text-soft);
            line-height: 1.45;
        }

        mark {
            background: #fff1a8;
            color: inherit;
            padding: 0 2px;
            border-radius: 3px;
        }

        .loading,
        .error,
        .empty-state {
            margin-top: 8px;
            padding: 28px 18px;
            text-align: center;
            border-radius: 14px;
            font-size: 0.96rem;
        }

        .loading {
            color: var(--text-soft);
            background: var(--panel-soft);
            border: 1px dashed var(--line);
        }

        .error {
            color: var(--danger);
            background: var(--danger-soft);
            border: 1px solid #f5caca;
        }

        .pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--line-soft);
        }

        .pagination-btn {
            min-width: 38px;
            height: 36px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pagination-btn:hover {
            background: var(--primary-soft);
            border-color: #c9daf8;
        }

        .pagination-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .pagination-btn.disabled,
        .pagination-btn.disabled:hover {
            color: #9aa4b2;
            background: #f8fafc;
            border-color: var(--line-soft);
            cursor: not-allowed;
        }

        .page-info {
            margin-left: 6px;
            color: var(--text-soft);
            font-size: 0.88rem;
        }

        .footer {
            text-align: center;
            padding: 14px 8px 2px;
            color: #748091;
            font-size: 0.85rem;
        }

        @media (max-width: 1100px) {
            .app-layout {
                grid-template-columns: 280px minmax(0, 1fr);
            }
        }

        @media (max-width: 900px) {
            body {
                padding: 12px;
            }

            .app-layout {
                grid-template-columns: 1fr;
            }

            .query-section {
                position: static;
            }
        }

        @media (max-width: 640px) {
            .header {
                padding: 18px 16px;
            }

            .header h1 {
                font-size: 1.45rem;
            }

            .query-section,
            .results-section {
                padding: 14px;
            }

            .btn-group {
                grid-template-columns: 1fr;
            }

            .results-table {
                min-width: 760px;
            }

            .results-table th,
            .results-table td {
                padding: 10px 10px;
                font-size: 0.86rem;
            }

            .results-table th:nth-child(1),
            .results-table td:nth-child(1) {
                width: 52px;
                min-width: 52px;
            }

            .results-table th:nth-child(2),
            .results-table td:nth-child(2) {
                width: 150px;
                min-width: 150px;
            }

            .results-table th:nth-child(3),
            .results-table td:nth-child(3) {
                width: 120px;
                min-width: 120px;
            }

            .results-table th:nth-child(4),
            .results-table td:nth-child(4) {
                width: 72px;
                min-width: 72px;
            }

            .results-table th:nth-child(5),
            .results-table td:nth-child(5) {
                width: 360px;
                min-width: 360px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>建筑规范数据库查询系统</h1>
            <p>基于近两年审查项目，对违反强制性条文与应执行条文内容进行筛选、检索与统计展示</p>
        </div>

        <div class="app-layout">
            <aside class="query-section">
                <div class="query-title">
                    <h2>筛选条件</h2>
                    <span class="panel-hint">左侧筛选，右侧结果</span>
                </div>

                <div class="filter-stack">
                    <div class="filter-group">
                        <label for="project-filter">项目分类</label>
                        <select id="project-filter" class="filter-select">
                            <option value="">全部项目分类</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="category-filter">规范分类</label>
                        <select id="category-filter" class="filter-select">
                            <option value="">全部规范分类</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="type-filter">类别</label>
                        <select id="type-filter" class="filter-select">
                            <option value="">全部类别</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="topic-filter">主题</label>
                        <select id="topic-filter" class="filter-select">
                            <option value="">全部主题</option>
                        </select>
                    </div>

                    <div class="search-group">
                        <label for="norm-search">规范条文查找</label>
                        <input type="text" id="norm-search" class="search-input" placeholder="输入规范名称或规范条文编号...">
                    </div>

                    <div class="search-group">
                        <label for="keyword-search">关键词搜索</label>
                        <input type="text" id="keyword-search" class="search-input" placeholder="输入关键词搜索具体内容...">
                    </div>
                </div>

                <div class="btn-group">
                    <button id="search-btn" class="btn btn-primary">查询数据</button>
                    <button id="reset-btn" class="btn btn-secondary">重置筛选</button>
                </div>

                <div class="query-note">
                    默认按“违反条数”从高到低排序。筛选项变化后会自动刷新；也可点击“查询数据”重新执行一次筛选。
                </div>
            </aside>

            <section class="results-section">
                <div class="results-header">
                    <div class="results-title">
                        <h2>查询结果</h2>
                    </div>
                    <div class="results-meta">
                        <div class="results-count">共找到 <span id="result-count">0</span> 条符合筛选条件的记录</div>
                    </div>
                </div>

                <div id="loading" class="loading">正在加载数据...</div>

                <div id="error-message" class="error" style="display: none;">
                    数据加载失败，请检查网络连接或 JSON 文件路径
                </div>

                <div class="results-table-wrap">
                    <table id="results-table" class="results-table" style="display: none;">
                        <thead>
                            <tr>
                                <th width="6%">排名</th>
                                <th width="22%">规范名称</th>
                                <th width="18%">规范条文编号</th>
                                <th width="10%">违反条数</th>
                                <th width="44%">条文内容</th>
                            </tr>
                        </thead>
                        <tbody id="results-body"></tbody>
                    </table>
                </div>
            </section>
        </div>

        <div class="footer">
            <p>© 2026 Yan Sun. All rights reserved. | present time：2026-03-05</p>
        </div>
    </div>

    <script>
        let allData = [];
        let filteredData = [];
        let projectOptions = new Set();
        let categoryOptions = new Set();
        let typeOptions = new Set();
        let topicOptions = new Set();
        let typeToTopics = {};

        let currentPage = 1;
        const itemsPerPage = 10;
        let totalPages = 1;
        let groupedData = [];
        const expandedGroups = new Set();

        const categoryFilter = document.getElementById('category-filter');
        const typeFilter = document.getElementById('type-filter');
        const projectFilter = document.getElementById('project-filter');
        const topicFilter = document.getElementById('topic-filter');
        const normSearch = document.getElementById('norm-search');
        const keywordSearch = document.getElementById('keyword-search');
        const searchBtn = document.getElementById('search-btn');
        const resetBtn = document.getElementById('reset-btn');
        const resultsBody = document.getElementById('results-body');
        const resultsTable = document.getElementById('results-table');
        const loadingElement = document.getElementById('loading');
        const errorMessage = document.getElementById('error-message');
        const resultCount = document.getElementById('result-count');
        const resultsSection = document.querySelector('.results-section');

        let paginationContainer = null;

        document.addEventListener('DOMContentLoaded', function () {
            loadJSONData();
            setupEventListeners();
            createPaginationContainer();
        });

        async function loadJSONData() {
            try {
                const response = await fetch('https://exceljson-1304523616.cos.ap-nanjing.myqcloud.com/data_20260308_a91f7e.json');
                if (!response.ok) {
                    throw new Error(`网络响应错误: ${response.status} ${response.statusText}`);
                }

                allData = await response.json();
                extractFilterOptions();
                populateFilterOptions();

                loadingElement.style.display = 'none';
                resultsTable.style.display = 'table';
                performSearch();
            } catch (error) {
                console.error('加载JSON数据失败:', error);
                loadingElement.style.display = 'none';
                errorMessage.style.display = 'block';
                errorMessage.innerHTML = `数据加载失败: ${error.message}<br>请确保源文件存在且格式正确`;
            }
        }

        function extractFilterOptions() {
            typeToTopics = {};
            allData.forEach(item => {
                if (item.规范分类) categoryOptions.add(item.规范分类);
                if (item.类别) {
                    typeOptions.add(item.类别);
                    if (item.主题) {
                        if (!typeToTopics[item.类别]) {
                            typeToTopics[item.类别] = new Set();
                        }
                        typeToTopics[item.类别].add(item.主题);
                    }
                }
                if (item.项目分类) projectOptions.add(item.项目分类);
                if (item.主题) topicOptions.add(item.主题);
            });
        }

        function fillSelectOptions(selectElement, values, defaultText, preservedValue = '') {
            selectElement.innerHTML = '';
            const defaultOption = document.createElement('option');
            defaultOption.value = '';
            defaultOption.textContent = defaultText;
            selectElement.appendChild(defaultOption);

            Array.from(values).sort().forEach(value => {
                const optionElement = document.createElement('option');
                optionElement.value = value;
                optionElement.textContent = value;
                if (value === preservedValue) {
                    optionElement.selected = true;
                }
                selectElement.appendChild(optionElement);
            });

            if (preservedValue && !Array.from(values).includes(preservedValue)) {
                selectElement.value = '';
            }
        }

        function getLinkedData(excludeField = '') {
            const selectedProject = excludeField === 'project' ? '' : projectFilter.value;
            const selectedCategory = excludeField === 'category' ? '' : categoryFilter.value;
            const selectedType = excludeField === 'type' ? '' : typeFilter.value;
            const selectedTopic = excludeField === 'topic' ? '' : topicFilter.value;

            return allData.filter(item => {
                if (selectedProject && item.项目分类 !== selectedProject) return false;
                if (selectedCategory && item.规范分类 !== selectedCategory) return false;
                if (selectedType && item.类别 !== selectedType) return false;
                if (selectedTopic && item.主题 !== selectedTopic) return false;
                return true;
            });
        }

        function refreshLinkedFilters() {
            const currentProject = projectFilter.value;
            const currentCategory = categoryFilter.value;
            const currentType = typeFilter.value;
            const currentTopic = topicFilter.value;

            const availableProjects = new Set(getLinkedData('project').map(item => item.项目分类).filter(Boolean));
            const availableCategories = new Set(getLinkedData('category').map(item => item.规范分类).filter(Boolean));
            const availableTypes = new Set(getLinkedData('type').map(item => item.类别).filter(Boolean));
            const availableTopics = new Set(getLinkedData('topic').map(item => item.主题).filter(Boolean));

            fillSelectOptions(projectFilter, availableProjects, '全部项目分类', currentProject);
            fillSelectOptions(categoryFilter, availableCategories, '全部规范分类', currentCategory);
            fillSelectOptions(typeFilter, availableTypes, '全部类别', currentType);
            fillSelectOptions(topicFilter, availableTopics, '全部主题', currentTopic);
        }

        function populateFilterOptions() {
            refreshLinkedFilters();
        }

        function setupEventListeners() {
            searchBtn.addEventListener('click', function () {
                currentPage = 1;
                refreshLinkedFilters();
                performSearch();
            });

            resetBtn.addEventListener('click', function () {
                categoryFilter.value = '';
                typeFilter.value = '';
                projectFilter.value = '';
                topicFilter.value = '';
                normSearch.value = '';
                keywordSearch.value = '';
                refreshLinkedFilters();
                currentPage = 1;
                performSearch();
            });

            categoryFilter.addEventListener('change', function () {
                refreshLinkedFilters();
                currentPage = 1;
                performSearch();
            });

            typeFilter.addEventListener('change', function () {
                refreshLinkedFilters();
                currentPage = 1;
                performSearch();
            });

            projectFilter.addEventListener('change', function () {
                refreshLinkedFilters();
                currentPage = 1;
                performSearch();
            });

            topicFilter.addEventListener('change', function () {
                refreshLinkedFilters();
                currentPage = 1;
                performSearch();
            });

            let searchTimeout = null;
            function triggerSearchWithDelay() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    currentPage = 1;
                    performSearch();
                }, 300);
            }

            normSearch.addEventListener('input', triggerSearchWithDelay);
            keywordSearch.addEventListener('input', triggerSearchWithDelay);
        }

        function performSearch() {
            const selectedCategory = categoryFilter.value;
            const selectedType = typeFilter.value;
            const selectedProject = projectFilter.value;
            const selectedTopic = topicFilter.value;
            const normKeyword = normSearch.value.toLowerCase().trim();
            const keyword = keywordSearch.value.toLowerCase().trim();

            filteredData = allData.filter(item => {
                if (selectedCategory && item.规范分类 !== selectedCategory) return false;
                if (selectedType && item.类别 !== selectedType) return false;
                if (selectedProject && item.项目分类 !== selectedProject) return false;
                if (selectedTopic && item.主题 !== selectedTopic) return false;
                if (normKeyword) {
                    const normName = (item.规范名称 || '').toLowerCase();
                    const normCode = (item.规范条文编号 || '').toLowerCase();
                    if (!normName.includes(normKeyword) && !normCode.includes(normKeyword)) return false;
                }
                if (keyword) {
                    const detailContent = (item.具体内容 || '').toLowerCase();
                    if (!detailContent.includes(keyword)) return false;
                }
                return true;
            });

            groupedData = groupByPrimaryArticle(filteredData);

            totalPages = Math.ceil(groupedData.length / itemsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const currentPageData = groupedData.slice(startIndex, endIndex);

            resultCount.textContent = filteredData.length;
            renderResults(currentPageData);
            updatePaginationControls();
        }

        function extractArticleInfo(code) {
            const rawCode = (code || '').toString().trim();
            const match = rawCode.match(/^(.*?第)(\d+(?:\.\d+)*)(条.*)$/);
            if (!match) {
                return {
                    rawCode,
                    normalizedCode: rawCode,
                    primaryCode: rawCode,
                    primaryNumber: '',
                    fullNumber: '',
                    isChild: false,
                    childSuffix: null,
                    sortParts: []
                };
            }

            const prefix = match[1];
            const numberPart = match[2];
            const suffix = match[3];
            const segments = numberPart.split('.');
            const isChild = segments.length >= 4;
            const primaryNumber = isChild ? segments.slice(0, 3).join('.') : numberPart;
            const primaryCode = `${prefix}${primaryNumber}${suffix}`;

            return {
                rawCode,
                normalizedCode: rawCode,
                primaryCode,
                primaryNumber,
                fullNumber: numberPart,
                isChild,
                childSuffix: isChild ? Number(segments[segments.length - 1]) || 0 : null,
                sortParts: segments.map(part => Number(part) || 0)
            };
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, ch => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[ch]));
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function highlightText(content, keyword = '') {
            const safeContent = escapeHtml(content || '');
            if (!keyword) return safeContent || '';
            const regex = new RegExp(`(${escapeRegExp(keyword)})`, 'gi');
            return safeContent.replace(regex, '<mark>$1</mark>');
        }

        function highlightContent(content) {
            return highlightText(content || '无条文内容', keywordSearch.value.trim());
        }

        function highlightNormText(content) {
            return highlightText(content || '', normSearch.value.trim());
        }

        function getGroupKey(item, articleInfo) {
            const normName = (item.规范名称 || '').toString().trim();
            return `${normName}||${articleInfo.primaryCode || articleInfo.normalizedCode || 'N/A'}`;
        }

        function compareByArticleInfo(a, b) {
            const aParts = a.articleInfo.sortParts || [];
            const bParts = b.articleInfo.sortParts || [];
            const maxLength = Math.max(aParts.length, bParts.length);
            for (let i = 0; i < maxLength; i++) {
                const diff = (aParts[i] || 0) - (bParts[i] || 0);
                if (diff !== 0) return diff;
            }
            return (a.规范条文编号 || '').localeCompare(b.规范条文编号 || '', 'zh-Hans-CN');
        }

        function buildTopicList(group) {
            const topics = new Set();
            if (group.mainItem && group.mainItem.主题) topics.add(group.mainItem.主题);
            group.childItems.forEach(item => {
                if (item.主题) topics.add(item.主题);
            });
            return Array.from(topics);
        }

        function groupByPrimaryArticle(data) {
            const groups = new Map();

            data.forEach(item => {
                const articleInfo = extractArticleInfo(item.规范条文编号);
                const enrichedItem = {
                    ...item,
                    articleInfo,
                    violationCount: Number(item.违反条数) || 0
                };
                const key = getGroupKey(item, articleInfo);
                if (!groups.has(key)) {
                    groups.set(key, {
                        key,
                        articleInfo,
                        mainItem: null,
                        fallbackItem: enrichedItem,
                        childItems: [],
                        totalViolationCount: 0
                    });
                }
                const group = groups.get(key);
                group.totalViolationCount += enrichedItem.violationCount;

                if (!articleInfo.isChild && articleInfo.normalizedCode === articleInfo.primaryCode) {
                    if (!group.mainItem || enrichedItem.violationCount > group.mainItem.violationCount) {
                        group.mainItem = enrichedItem;
                    }
                } else {
                    group.childItems.push(enrichedItem);
                }

                if (enrichedItem.violationCount > (group.fallbackItem?.violationCount || 0)) {
                    group.fallbackItem = enrichedItem;
                }
            });

            const groupedList = Array.from(groups.values()).map(group => {
                if (!group.mainItem) {
                    group.mainItem = {
                        ...group.fallbackItem,
                        规范条文编号: group.articleInfo.primaryCode || group.fallbackItem.规范条文编号 || 'N/A',
                        条文内容: '未单列主条文内容，请展开查看下方子条文。',
                        主题: group.fallbackItem.主题 || '未指定',
                        isSyntheticMain: true,
                        articleInfo: {
                            ...group.fallbackItem.articleInfo,
                            isChild: false,
                            primaryCode: group.articleInfo.primaryCode || group.fallbackItem.规范条文编号 || 'N/A'
                        }
                    };
                }

                group.childItems.sort(compareByArticleInfo);
                group.topicList = buildTopicList(group);
                return group;
            });

            groupedList.sort((a, b) => {
                if (b.totalViolationCount !== a.totalViolationCount) {
                    return b.totalViolationCount - a.totalViolationCount;
                }
                return (a.articleInfo.primaryCode || '').localeCompare(b.articleInfo.primaryCode || '', 'zh-Hans-CN');
            });

            return groupedList;
        }

        function createPaginationContainer() {
            paginationContainer = document.createElement('div');
            paginationContainer.className = 'pagination-controls';
            resultsSection.appendChild(paginationContainer);
        }

        function updatePaginationControls() {
            if (!paginationContainer) return;
            paginationContainer.innerHTML = '';
            if (groupedData.length <= itemsPerPage) return;

            const prevButton = document.createElement('button');
            prevButton.textContent = '上一页';
            prevButton.className = 'pagination-btn';
            if (currentPage === 1) {
                prevButton.classList.add('disabled');
            } else {
                prevButton.addEventListener('click', () => {
                    currentPage--;
                    performSearch();
                });
            }
            paginationContainer.appendChild(prevButton);

            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }

            if (startPage > 1) {
                const firstButton = document.createElement('button');
                firstButton.textContent = '1';
                firstButton.className = 'pagination-btn';
                firstButton.addEventListener('click', () => {
                    currentPage = 1;
                    performSearch();
                });
                paginationContainer.appendChild(firstButton);

                if (startPage > 2) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.className = 'page-info';
                    paginationContainer.appendChild(ellipsis);
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageButton = document.createElement('button');
                pageButton.textContent = i;
                pageButton.className = 'pagination-btn';
                if (i === currentPage) {
                    pageButton.classList.add('active');
                } else {
                    pageButton.addEventListener('click', () => {
                        currentPage = i;
                        performSearch();
                    });
                }
                paginationContainer.appendChild(pageButton);
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.className = 'page-info';
                    paginationContainer.appendChild(ellipsis);
                }

                const lastButton = document.createElement('button');
                lastButton.textContent = totalPages;
                lastButton.className = 'pagination-btn';
                lastButton.addEventListener('click', () => {
                    currentPage = totalPages;
                    performSearch();
                });
                paginationContainer.appendChild(lastButton);
            }

            const nextButton = document.createElement('button');
            nextButton.textContent = '下一页';
            nextButton.className = 'pagination-btn';
            if (currentPage === totalPages) {
                nextButton.classList.add('disabled');
            } else {
                nextButton.addEventListener('click', () => {
                    currentPage++;
                    performSearch();
                });
            }
            paginationContainer.appendChild(nextButton);

            const pageInfo = document.createElement('span');
            pageInfo.className = 'page-info';
            pageInfo.textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
            paginationContainer.appendChild(pageInfo);
        }

        function renderResults(data) {
            resultsBody.innerHTML = '';
            if (data.length === 0) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = `
                    <td colspan="5" class="empty-state">
                        没有找到匹配的记录，请尝试其他筛选条件
                    </td>
                `;
                resultsBody.appendChild(emptyRow);
                return;
            }

            const startRank = (currentPage - 1) * itemsPerPage + 1;

            data.forEach((group, index) => {
                const row = document.createElement('tr');
                const rank = startRank + index;
                const mainItem = group.mainItem;

                const rankCell = document.createElement('td');
                rankCell.className = 'rank-cell';
                rankCell.textContent = rank;

                const nameCell = document.createElement('td');
                nameCell.innerHTML = `
                    <div class="norm-name">${highlightNormText(mainItem.规范名称 || '未命名规范')}</div>
                    <div class="tag-row">
                        <span class="tag tag-gray">${escapeHtml(mainItem.规范分类 || '未分类')}</span>
                        <span class="tag tag-purple">${escapeHtml(mainItem.项目分类 || '未分类')}</span>
                        <span class="tag tag-green">${escapeHtml(mainItem.类别 || '未分类')}</span>
                    </div>
                `;

                const codeCell = document.createElement('td');
                const topicHtml = group.topicList.length
                    ? `<div class="group-topic-list">${group.topicList.map(topic => `<span class="group-topic-chip">${escapeHtml(topic)}</span>`).join('')}</div>`
                    : `<div class="topic-text">主题：未指定</div>`;
                codeCell.innerHTML = `
                    <div class="norm-code">${highlightNormText(mainItem.规范条文编号 || 'N/A')}</div>
                    ${topicHtml}
                `;

                const violationCell = document.createElement('td');
                violationCell.innerHTML = `
                    <div class="violation-count">${group.totalViolationCount}</div>
                    <div class="violation-meta">主条文排序值（含子条文累计）${group.childItems.length ? `<br>含子条文 ${group.childItems.length} 条` : ''}</div>
                `;

                const contentCell = document.createElement('td');
                contentCell.className = 'content-cell';
                const toggleId = `group-${currentPage}-${index}`;
                const detailToggleId = `detail-${currentPage}-${index}`;
                const mainDetail = (mainItem.具体内容 || '').toString().trim();
                const hasMainDetail = !!mainDetail;

                function buildDetailToggle(detailText, blockId, buttonLabel = '展开具体内容') {
                    const safeDetailText = detailText && detailText.trim()
                        ? `<div class="detail-text">${highlightContent(detailText)}</div>`
                        : `<div class="detail-text">无具体内容</div>`;
                    return `
                        <button class="detail-toggle-btn" type="button" data-target="${blockId}">
                            ${buttonLabel}
                        </button>
                        <div id="${blockId}" class="detail-block">
                            <div class="detail-title">具体内容</div>
                            ${safeDetailText}
                        </div>
                    `;
                }

                let childBlock = '';
                if (group.childItems.length) {
                    const isOpen = expandedGroups.has(group.key);
                    const childItemsHtml = group.childItems.map((child, childIndex) => {
                        const childDetail = (child.具体内容 || '').toString().trim();
                        const childDetailId = `child-detail-${currentPage}-${index}-${childIndex}`;
                        const childDetailHtml = childDetail ? buildDetailToggle(childDetail, childDetailId) : '';
                        return `
                        <div class="child-item">
                            <div class="child-item-header">
                                <span class="child-code">${highlightNormText(child.规范条文编号 || 'N/A')}</span>
                                <span class="child-count">${child.violationCount}</span>
                            </div>
                            <div class="topic-text">主题：${escapeHtml(child.主题 || '未指定')}</div>
                            <div class="main-content-text">${highlightContent(child.条文内容 || '无条文内容')}</div>
                            ${childDetailHtml}
                        </div>
                    `}).join('');
                    childBlock = `
                        <button class="child-toggle-btn" type="button" data-group-key="${escapeHtml(group.key)}" data-target="${toggleId}">
                            ${isOpen ? '收起' : '展开'}子条文（${group.childItems.length}）
                        </button>
                        <div id="${toggleId}" class="child-list ${isOpen ? 'is-open' : ''}">${childItemsHtml}</div>
                    `;
                }
                const mainDetailBlock = hasMainDetail ? buildDetailToggle(mainDetail, detailToggleId) : '';
                contentCell.innerHTML = `
                    <div class="group-content">
                        <div class="main-content-text">${highlightContent(mainItem.条文内容 || '无条文内容')}</div>
                        ${mainDetailBlock}
                        ${childBlock}
                    </div>
                `;

                row.appendChild(rankCell);
                row.appendChild(nameCell);
                row.appendChild(codeCell);
                row.appendChild(violationCell);
                row.appendChild(contentCell);
                resultsBody.appendChild(row);
            });

            bindChildToggleEvents();
        }

        function bindChildToggleEvents() {
            resultsBody.querySelectorAll('.child-toggle-btn').forEach(button => {
                button.addEventListener('click', function () {
                    const groupKey = this.dataset.groupKey;
                    const targetId = this.dataset.target;
                    const target = document.getElementById(targetId);
                    if (!target) return;

                    const isOpen = target.classList.toggle('is-open');
                    if (isOpen) {
                        expandedGroups.add(groupKey);
                        this.textContent = this.textContent.replace('展开', '收起');
                    } else {
                        expandedGroups.delete(groupKey);
                        this.textContent = this.textContent.replace('收起', '展开');
                    }
                });
            });

            resultsBody.querySelectorAll('.detail-toggle-btn').forEach(button => {
                button.addEventListener('click', function () {
                    const targetId = this.dataset.target;
                    const target = document.getElementById(targetId);
                    if (!target) return;
                    const isOpen = target.classList.toggle('is-open');
                    this.textContent = isOpen ? '收起具体内容' : '展开具体内容';
                });
            });
        }
    </script>
</body>
