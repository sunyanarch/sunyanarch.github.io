<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>访问验证</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 360px;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h2 { margin-top: 0; font-size: 20px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      margin: 10px 0 14px;
      border: 1px solid #d0d7e2;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px 12px;
      border: 0;
      border-radius: 8px;
      background: #2f6feb;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    .msg {
      margin-top: 10px;
      color: #c62828;
      font-size: 13px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Please enter your password</h2>
    <input type="password" id="pwd" placeholder="Please enter your password" />
    <button type="button" id="loginBtn">Login</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const PASSWORD = "234561";
    const TARGET_PAGE = "./index_v4.html"; 

    function doLogin() {
      const pwd = document.getElementById("pwd").value.trim();
      const msg = document.getElementById("msg");

      if (pwd === PASSWORD) {
        sessionStorage.setItem("page_auth_ok", "1");
        window.location.href = TARGET_PAGE;
      } else {
        msg.textContent = "Please try again!";
      }
    }

    document.getElementById("loginBtn").addEventListener("click", doLogin);

    document.getElementById("pwd").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        doLogin();
      }
    });
  </script>
</body>
</html>
