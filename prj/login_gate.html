<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>访问验证</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #d8e0ea;
      --text: #1f2a37;
      --muted: #6b7280;
      --primary: #2f6feb;
      --primary-hover: #2358b8;
      --danger: #c62828;
      --shadow: 0 10px 30px rgba(31, 42, 55, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 700;
    }

    p.desc {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--muted);
    }

    input[type="password"] {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(47, 111, 235, 0.12);
    }

    .actions {
      margin-top: 16px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .msg {
      margin-top: 12px;
      min-height: 20px;
      color: var(--danger);
      font-size: 13px;
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>请输入访问密码</h1>
        <label for="pwd">访问密码</label>
    <input type="password" id="pwd" placeholder="请输入密码" autocomplete="off" />

    <div class="actions">
      <button type="button" id="loginBtn">进入页面</button>
    </div>

    <div class="msg" id="msg"></div>

  </div>

  <script>
    const PASSWORD = "234561";
    const TARGET_PAGE = "./index_v4.html";
    const EXPIRE_MINUTES = 10;

    function doLogin() {
      const pwdInput = document.getElementById("pwd");
      const msg = document.getElementById("msg");
      const pwd = pwdInput.value.trim();

      if (pwd === PASSWORD) {
        const expireAt = Date.now() + EXPIRE_MINUTES * 60 * 1000;
        sessionStorage.setItem("page_auth_ok", "1");
        sessionStorage.setItem("page_auth_expire", String(expireAt));
        window.location.href = TARGET_PAGE;
      } else {
        msg.textContent = "密码错误，请重试。";
      }
    }

    document.getElementById("loginBtn").addEventListener("click", doLogin);

    document.getElementById("pwd").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        doLogin();
      }
    });
  </script>
</body>
</html>
